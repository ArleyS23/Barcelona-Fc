<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Landing informativa e interactiva del FC Barcelona con CuleBot integrado."
    />
    <title>FC Barcelona - Mes que un club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&family=Montserrat:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      integrity="sha512-SnH5WK+bZxgPHs44uWix+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkR4j8NtQ5f9BnLw1L0fQ4X4fR9S7R8WfU6g=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/main.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">Saltar al contenido principal</a>
    <nav id="main-navbar" class="navbar" aria-label="Navegacion principal">
      <div class="navbar__brand">
        <div class="navbar__logo" aria-hidden="true">FCB</div>
        <span class="navbar__title">Barca</span>
      </div>
      <ul class="navbar__menu" id="navbar-menu"></ul>
      <button class="navbar__toggle" id="navbar-toggle" aria-label="Abrir o cerrar menu">
        <i class="fas fa-bars" aria-hidden="true"></i>
      </button>
    </nav>

    <main id="main-content" class="content" tabindex="-1">
      <div id="app" class="section-host" aria-live="polite"></div>
    </main>

    <button id="culebot-bubble" class="culebot-bubble" aria-label="Abrir chat CuleBot">
      <i class="fas fa-comment-dots" aria-hidden="true"></i>
    </button>
    <section id="culebot-panel" class="culebot-panel" aria-label="Chat CuleBot" hidden>
      <header class="culebot-panel__header">
        <h2>CuleBot</h2>
        <button id="culebot-close" aria-label="Cerrar chat">
          <i class="fas fa-times" aria-hidden="true"></i>
        </button>
      </header>
      <div id="culebot-messages" class="culebot-panel__messages"></div>
      <form id="culebot-form" class="culebot-panel__form">
        <label class="visually-hidden" for="culebot-input">Mensaje</label>
        <input id="culebot-input" type="text" maxlength="250" placeholder="Pregunta sobre el Barca..." />
        <button type="submit">Enviar</button>
      </form>
    </section>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
